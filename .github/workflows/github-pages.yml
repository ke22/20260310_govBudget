# Static HTML/CSS/JS → GitHub Pages (official Pages Actions).
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.
name: Deploy site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble site into _site
        run: |
          DEST="_site"
          mkdir -p "$DEST"
          cp index.html budget.html legislators.html other.html main_vs.js styles_vs.css "$DEST/"
          cp data_page_a.json data_page_b.json data_page_c.json data_page_d.json "$DEST/"
          cp -r vs-modules img "$DEST/"
          if [ -d photos ]; then cp -r photos "$DEST/"; fi
          cp color-preview.html "$DEST/" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
